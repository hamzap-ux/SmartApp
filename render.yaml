services:
  - type: web
    name: smartapp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 3 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
