{% extends "base.html" %}

{% block title %}Login{% endblock %}
{% block header_title %}Login to SmartApp{% endblock %}

{% block content %}
<div class="chart-card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 20px;">Welcome Back</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-submit">Login</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent-teal);">Register here</a>
    </p>
</div>
{% endblock %}
