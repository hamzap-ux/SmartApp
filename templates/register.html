{% extends "base.html" %}

{% block title %}Register{% endblock %}
{% block header_title %}Create an Account{% endblock %}

{% block content %}
<div class="chart-card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 20px;">Join SmartApp</h2>
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">
            A welcome email will be sent to your address upon successful registration.
        </p>
        <button type="submit" class="btn-submit">Register</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent-teal);">Login here</a>
    </p>
</div>
{% endblock %}
