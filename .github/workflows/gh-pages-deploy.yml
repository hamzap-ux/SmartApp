name: Build & deploy static login to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install Jinja2

      - name: Generate static site (login)
        run: |
          python freeze_static.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # allow using a personal token if the repo restricts Actions permissions
          personal_token: ${{ secrets.GH_PAGES_PAT || github.token }}
          publish_dir: ./build
